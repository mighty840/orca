<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
    <linearGradient id="fin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="#0F172A"/>
  <circle cx="256" cy="256" r="240" fill="none" stroke="#1E293B" stroke-width="2"/>
  <!-- Orca body - geometric whale shape -->
  <path d="M140 300 Q140 220 200 190 L260 170 Q320 155 360 180 Q400 205 410 260 Q415 290 400 320 Q380 355 340 365 Q300 375 260 370 L200 360 Q160 350 140 300Z" fill="url(#body)"/>
  <!-- Dorsal fin -->
