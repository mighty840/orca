  <circle cx="223" cy="227" r="4" fill="#22D3EE"/>
  <!-- Tail fluke -->
  <path d="M140 300 Q120 310 100 290 Q90 275 105 270 Q120 268 140 280Z" fill="url(#body)"/>
  <path d="M140 300 Q120 320 100 335 Q88 345 95 350 Q110 348 135 330 Q145 320 140 310Z" fill="url(#body)"/>
  <!-- Container/hex accent marks -->
  <rect x="310" cy="200" y="195" width="18" height="18" rx="3" fill="#22D3EE" opacity="0.6" transform="rotate(15 319 204)"/>
  <rect x="345" y="220" width="12" height="12" rx="2" fill="#22D3EE" opacity="0.4" transform="rotate(-10 351 226)"/>
  <rect x="370" y="195" width="8" height="8" rx="1.5" fill="#22D3EE" opacity="0.3"/>
</svg>
