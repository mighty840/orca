name: Publish to crates.io

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

jobs:
  publish:
    name: Publish crates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Verify version matches tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag v$TAG does not match Cargo.toml version $VERSION"
            exit 1
          fi

      - name: Run tests
        run: cargo test

      - name: Publish all crates
        run: |
          publish() {
            local crate=$1
            echo "Publishing $crate..."
            OUTPUT=$(cargo publish -p "$crate" 2>&1) || true
            if echo "$OUTPUT" | grep -q "Uploading"; then
              echo "$crate published successfully"
            elif echo "$OUTPUT" | grep -q "already exists"; then
              echo "$crate already published, skipping"
            elif echo "$OUTPUT" | grep -q "already uploaded"; then
              echo "$crate already uploaded, skipping"
            else
              echo "Failed to publish $crate:"
              echo "$OUTPUT"
              exit 1
            fi
            sleep 25
          }

          publish orca-core
          publish orca-proxy
          publish orca-ai
          publish orca-tui
          publish orca-agent
          publish orca-control
          publish mallorca

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes 2>/dev/null || \
          gh release edit "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" 2>/dev/null || \
          echo "Release already exists"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
